name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci
          DATABASE_URL_UNPOOLED: postgresql://ci:ci@localhost/ci

      - name: Build
        run: npx next build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci
          DATABASE_URL_UNPOOLED: postgresql://ci:ci@localhost/ci
          NEXTAUTH_SECRET: ci-secret-for-build-only
          NEXTAUTH_URL: http://localhost:3000
          AUTH_TRUST_HOST: "true"

      - name: Lint
        run: npm run lint
